{%- comment -%}
  Side-nav language filter, rendered server-side so there is no flash.
  Hides nav items whose direct child link points to the *other* language.
{%- endcomment -%}
{% if page.url contains '/fr/' %}
<style>
  .site-nav .nav-list-item:has(> a.nav-list-link[href*="/en/"]) { display: none; }
</style>
{% elsif page.url contains '/en/' %}
<style>
  .site-nav .nav-list-item:has(> a.nav-list-link[href*="/fr/"]) { display: none; }
</style>
{% endif %}

{% if page.lang_alt_url %}
<script>
(function () {
  function init() {
    var altUrl = '{{ page.lang_alt_url | relative_url }}';
    var path = window.location.pathname;
    var label = path.indexOf('/fr/') !== -1 ? 'EN'
              : path.indexOf('/en/') !== -1 ? 'FR'
              : null;
    if (!label || !altUrl) return;
    var auxNav = document.querySelector('.aux-nav-list');
    if (!auxNav) return;
    var li = document.createElement('li');
    li.className = 'aux-nav-list-item';
    var a = document.createElement('a');
    a.href = altUrl;
    a.className = 'site-button';
    a.textContent = label;
    li.appendChild(a);
    auxNav.insertBefore(li, auxNav.firstChild);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
{% endif %}
