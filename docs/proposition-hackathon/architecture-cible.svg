<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="820" height="580" fill="#ffffff" rx="4"/>

  <!-- Browser container -->
  <rect x="60" y="40" width="700" height="280" rx="12" fill="#e7f5ff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="410" y="72" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e1e1e">NAVIGATEUR</text>

  <!-- App Cliente -->
  <rect x="100" y="100" width="240" height="180" rx="8" fill="#d0bfff" stroke="#1971c2" stroke-width="2"/>
  <text x="220" y="132" text-anchor="middle" font-size="18" font-weight="bold" fill="#1971c2">App Cliente</text>
  <text x="220" y="158" text-anchor="middle" font-size="14" fill="#495057">(Tmail, Docs)</text>
  <text x="220" y="240" text-anchor="middle" font-size="13" fill="#868e96">Session active A</text>

  <!-- iframe File Picker -->
  <rect x="470" y="100" width="260" height="180" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
  <text x="600" y="132" text-anchor="middle" font-size="18" font-weight="bold" fill="#2f9e44">iframe: File Picker</text>
  <text x="600" y="158" text-anchor="middle" font-size="14" fill="#495057">(TDrive, Fichiers...)</text>
  <text x="600" y="240" text-anchor="middle" font-size="13" fill="#868e96">Session active B</text>

  <!-- postMessage double arrow -->
  <defs>
    <marker id="arrowLeft" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto-start-reverse">
      <polygon points="10 0, 0 3.5, 10 7" fill="#e8590c"/>
    </marker>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e8590c"/>
    </marker>
    <marker id="arrowDown-orange" markerWidth="10" markerHeight="7" refX="3.5" refY="0" orient="auto">
      <polygon points="0 0, 3.5 10, 7 0" fill="#f08c00"/>
    </marker>
    <marker id="arrowDown-green" markerWidth="10" markerHeight="7" refX="3.5" refY="0" orient="auto">
      <polygon points="0 0, 3.5 10, 7 0" fill="#2f9e44"/>
    </marker>
  </defs>

  <line x1="345" y1="190" x2="465" y2="190" stroke="#e8590c" stroke-width="2.5" marker-start="url(#arrowLeft)" marker-end="url(#arrowRight)"/>
  <text x="405" y="178" text-anchor="middle" font-size="14" font-weight="bold" fill="#e8590c">postMessage</text>

  <!-- Arrow: App Cliente -> Plateforme -->
  <line x1="220" y1="285" x2="220" y2="395" stroke="#f08c00" stroke-width="2" marker-end="url(#arrowDown-orange)"/>
  <text x="232" y="348" font-size="13" font-weight="bold" fill="#f08c00">GET /resolve</text>

  <!-- Arrow: iframe -> Service cible -->
  <line x1="600" y1="285" x2="600" y2="395" stroke="#2f9e44" stroke-width="2" marker-end="url(#arrowDown-green)"/>

  <!-- Plateforme -->
  <rect x="80" y="400" width="280" height="130" rx="8" fill="#fff3bf" stroke="#f08c00" stroke-width="2"/>
  <text x="220" y="435" text-anchor="middle" font-size="18" font-weight="bold" fill="#f08c00">Plateforme</text>
  <text x="220" y="462" text-anchor="middle" font-size="14" fill="#495057">(Open Buro server)</text>
  <text x="220" y="485" text-anchor="middle" font-size="13" fill="#868e96">registry.json</text>

  <!-- Service cible -->
  <rect x="470" y="400" width="260" height="130" rx="8" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2"/>
  <text x="600" y="435" text-anchor="middle" font-size="18" font-weight="bold" fill="#2f9e44">Service cible</text>
  <text x="600" y="462" text-anchor="middle" font-size="14" fill="#495057">(drive)</text>
</svg>
