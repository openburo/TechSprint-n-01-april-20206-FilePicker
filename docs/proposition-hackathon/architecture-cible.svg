<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="'Virgil', 'Segoe UI', system-ui, sans-serif" style="max-width:800px">

  <!-- Browser container -->
  <rect x="40" y="20" width="720" height="290" rx="10" fill="#e7f5ff" stroke="#343a40" stroke-width="2"/>
  <text x="400" y="52" text-anchor="middle" font-size="20" font-weight="600" fill="#343a40" letter-spacing="2">NAVIGATEUR</text>

  <!-- App Cliente box -->
  <rect x="80" y="80" width="260" height="200" rx="8" fill="#d0bfff" stroke="#5c3d99" stroke-width="2"/>
  <text x="210" y="115" text-anchor="middle" font-size="19" font-weight="600" fill="#5c3d99">App Cliente</text>
  <text x="210" y="145" text-anchor="middle" font-size="15" fill="#495057">(Tmail, Docs)</text>
  <line x1="120" y1="160" x2="300" y2="160" stroke="#5c3d99" stroke-width="0.5" opacity="0.3"/>
  <text x="210" y="250" text-anchor="middle" font-size="14" fill="#6c757d" font-style="italic">Session active A</text>

  <!-- iframe File Picker box -->
  <rect x="460" y="80" width="270" height="200" rx="8" fill="#b2f2bb" stroke="#2b8a3e" stroke-width="2"/>
  <text x="595" y="115" text-anchor="middle" font-size="19" font-weight="600" fill="#2b8a3e">iframe : File Picker</text>
  <text x="595" y="145" text-anchor="middle" font-size="15" fill="#495057">(TDrive, Fichiers...)</text>
  <line x1="500" y1="160" x2="690" y2="160" stroke="#2b8a3e" stroke-width="0.5" opacity="0.3"/>
  <text x="595" y="250" text-anchor="middle" font-size="14" fill="#6c757d" font-style="italic">Session active B</text>

  <!-- postMessage bidirectional arrow -->
  <!-- Arrow line -->
  <line x1="345" y1="180" x2="455" y2="180" stroke="#e8590c" stroke-width="2.5"/>
  <!-- Left arrowhead -->
  <polygon points="345,180 358,174 358,186" fill="#e8590c"/>
  <!-- Right arrowhead -->
  <polygon points="455,180 442,174 442,186" fill="#e8590c"/>
  <!-- Label -->
  <rect x="353" y="160" width="104" height="18" rx="3" fill="#fff5f0" opacity="0.9"/>
  <text x="405" y="174" text-anchor="middle" font-size="13" font-weight="600" fill="#e8590c">postMessage</text>

  <!-- Arrow: App Cliente → Plateforme -->
  <line x1="210" y1="285" x2="210" y2="385" stroke="#e67700" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Arrowhead -->
  <polygon points="210,390 204,378 216,378" fill="#e67700"/>
  <!-- Label with background -->
  <rect x="218" y="322" width="95" height="20" rx="3" fill="#fff9db" opacity="0.9"/>
  <text x="265" y="337" text-anchor="middle" font-size="13" font-weight="600" fill="#e67700">GET /resolve</text>

  <!-- Arrow: iframe → Service cible -->
  <line x1="595" y1="285" x2="595" y2="385" stroke="#2b8a3e" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Arrowhead -->
  <polygon points="595,390 589,378 601,378" fill="#2b8a3e"/>

  <!-- Plateforme box -->
  <rect x="60" y="395" width="300" height="130" rx="8" fill="#fff3bf" stroke="#e67700" stroke-width="2"/>
  <text x="210" y="430" text-anchor="middle" font-size="19" font-weight="600" fill="#e67700">Plateforme</text>
  <text x="210" y="458" text-anchor="middle" font-size="15" fill="#495057">(Open Buro server)</text>
  <text x="210" y="485" text-anchor="middle" font-size="14" fill="#6c757d" font-style="italic">registry.json</text>

  <!-- Service cible box -->
  <rect x="460" y="395" width="270" height="130" rx="8" fill="#d3f9d8" stroke="#2b8a3e" stroke-width="2"/>
  <text x="595" y="430" text-anchor="middle" font-size="19" font-weight="600" fill="#2b8a3e">Service cible</text>
  <text x="595" y="458" text-anchor="middle" font-size="15" fill="#495057">(drive)</text>

</svg>
